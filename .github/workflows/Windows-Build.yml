name: Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2019
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.3'
          host: 'windows'
          target: 'desktop'
          arch: ${{ matrix.arch == 'arm64' && 'win64_msvc2019_arm64' || 'win64_msvc2019_64' }}
          modules: ${{ matrix.arch == 'arm64' && 'qtsvg' || 'qtwebsockets qtsvg' }}
          cache: true

      - name: Configure
        run: |
          mkdir build-windows-${{ matrix.arch }}
          cd build-windows-${{ matrix.arch }}
          cmake -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX=. ^
                -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" ^
                ../

      - name: Build
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%

      - name: Install
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --install .

      - name: Package NSIS
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G NSIS

      - name: Package ZIP
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G ZIP
