name: Windows Qt Minimal

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Activate MSVC environment (required for Qt + CMake)
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Install Qt using the same pinned versions as the official test.yml
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true
          aqtversion: '==3.2.0'
          py7zrversion: '==0.20.5'

      # Configure with CMake
      - name: Configure
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" ^
                ..

      # Build
      - name: Build
        run: |
          cd build
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%
