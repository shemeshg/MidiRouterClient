name: Windows Qt Minimal

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install aqtinstall (pinned)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.2.0" "py7zr==0.20.5"

      - name: Install Qt 6.10.3 (x64, MSVC)
        run: |
          python -m aqt install-qt windows desktop 6.10.3 win64_msvc2019_64 --outputdir Qt

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_PREFIX_PATH="%CD%\..\Qt\6.10.3\msvc2019_64" ^
                ..

      - name: Build
        run: |
          cd build
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%
