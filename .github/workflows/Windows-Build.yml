name: Windows Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      # IMPORTANT: Python must be set BEFORE install-qt-action
      - name: Use Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Activate MSVC environment
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'arm64' && 'amd64_arm64' || 'x64' }}

      # Install Qt (now runs under Python 3.10)
      - uses: jurplel/install-qt-action@v4
        with:
          version: "${{ matrix.arch == 'arm64' && '6.9.3' || '6.10.3' }}"
          host: windows
          target: desktop
          arch: ${{ matrix.arch == 'arm64' && 'win64_msvc2019_arm64' || 'win64_msvc2019_64' }}
          cache: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure
        run: |
          mkdir build-windows-${{ matrix.arch }}
          cd build-windows-${{ matrix.arch }}
          cmake -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX=. ^
                -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" ^
                ../

      - name: Build
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%

      - name: Install
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --install .

      - name: Package NSIS
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G NSIS

      - name: Package ZIP
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G ZIP

      - name: Rename ARM64 artifacts
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          cd build-windows-arm64
          Get-ChildItem "midi-router-client-*.exe" | Rename-Item -NewName { $_.Name -replace '.exe','-ARM.exe' }
          Get-ChildItem "midi-router-client-*.zip" | Rename-Item -NewName { $_.Name -replace '.zip','-ARM.zip' }

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-nsis
          path: build-windows-${{ matrix.arch }}/*.exe

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-zip
          path: build-windows-${{ matrix.arch }}/*.zip
