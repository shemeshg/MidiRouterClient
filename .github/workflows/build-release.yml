name: Build and Package - Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt6
        run: |
          brew install qt@6
          echo "$(brew --prefix qt@6)/libexec/bin" >> $GITHUB_PATH
      
      - name: Configure MidiRouterClient
        run: |
          mkdir -p build-macos
          cd build-macos
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=. -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" ../
      
      - name: Build MidiRouterClient
        run: |
          cd build-macos
          cmake --build . --parallel $(sysctl -n hw.ncpu)
      
      - name: Install MidiRouterClient
        run: |
          cd build-macos
          cmake --install .
      
      - name: Package - dragNDrop
        run: |
          cd build-macos
          cpack -G DragNDrop
      
      - name: Package - ZIP
        run: |
          cd build-macos
          cpack -G ZIP
      
      - name: Upload dragNDrop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build-macos/*.dmg
          
      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: build-macos/*.zip

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      
      - name: Install Qt6 latest
        run: |
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-websockets-dev qt6-svg-dev qt6-tools-dev cmake
          qt6_version=$(dpkg -l | grep "qt6-base-dev" | awk '{print $3}')
          echo "Installed Qt6 version: $qt6_version"
      
      - name: Set up cross-compilation for ARM64
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
      
      - name: Configure MidiRouterClient
        run: |
          mkdir -p build-linux-${{ matrix.arch }}
          cd build-linux-${{ matrix.arch }}
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=. ../
      
      - name: Build MidiRouterClient
        run: |
          cd build-linux-${{ matrix.arch }}
          cmake --build . --parallel $(nproc)
      
      - name: Install MidiRouterClient
        run: |
          cd build-linux-${{ matrix.arch }}
          cmake --install .
      
      - name: Package - DEB
        run: |
          cd build-linux-${{ matrix.arch }}
          cpack -G DEB
      
      - name: Package - ZIP
        run: |
          cd build-linux-${{ matrix.arch }}
          cpack -G ZIP
      
      - name: Rename ARM64 artifacts
        if: matrix.arch == 'arm64'
        run: |
          cd build-linux-${{ matrix.arch }}
          for file in midi-router-client-*.deb; do mv "$file" "${file%.deb}-ARM.deb"; done
          for file in midi-router-client-*.zip; do mv "$file" "${file%.zip}-ARM.zip"; done
      
      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-deb
          path: build-linux-${{ matrix.arch }}/*.deb
          
      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-zip
          path: build-linux-${{ matrix.arch }}/*.zip

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets qtsvg'
          cache: true
      
      - name: Configure MidiRouterClient
        run: |
          mkdir build-windows-${{ matrix.arch }}
          cd build-windows-${{ matrix.arch }}
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=. -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" ../
      
      - name: Build MidiRouterClient
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%
      
      - name: Install MidiRouterClient
        run: |
          cd build-windows-${{ matrix.arch }}
          cmake --install .
      
      - name: Package - NSIS
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G NSIS
      
      - name: Package - ZIP
        run: |
          cd build-windows-${{ matrix.arch }}
          cpack -G ZIP
      
      - name: Rename ARM64 artifacts
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          cd build-windows-${{ matrix.arch }}
          Get-ChildItem "midi-router-client-*.exe" | ForEach-Object { Rename-Item -Path $_.FullName -NewName ($_.Name -replace '.exe','-ARM.exe') }
          Get-ChildItem "midi-router-client-*.zip" | ForEach-Object { Rename-Item -Path $_.FullName -NewName ($_.Name -replace '.zip','-ARM.zip') }
      
      - name: Upload NSIS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-nsis
          path: build-windows-${{ matrix.arch }}/*.exe
          
      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-zip
          path: build-windows-${{ matrix.arch }}/*.zip

  build-windows-cli:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebsockets qtsvg'
          cache: true
      
      - name: Configure MidiRouterClientCli
        run: |
          mkdir build-windows-cli-${{ matrix.arch }}
          cd build-windows-cli-${{ matrix.arch }}
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=. -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" ../MidiRouterClientCli
      
      - name: Build MidiRouterClientCli
        run: |
          cd build-windows-cli-${{ matrix.arch }}
          cmake --build . --parallel %NUMBER_OF_PROCESSORS%
      
      - name: Install MidiRouterClientCli
        run: |
          cd build-windows-cli-${{ matrix.arch }}
          cmake --install .
      
      - name: Package - ZIP only
        run: |
          cd build-windows-cli-${{ matrix.arch }}
          cpack -G ZIP
      
      - name: Rename ARM64 artifacts
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          cd build-windows-cli-${{ matrix.arch }}
          Get-ChildItem "midi-router-client-cli-*.zip" | ForEach-Object { Rename-Item -Path $_.FullName -NewName ($_.Name -replace '.zip','-ARM.zip') }
      
      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-cli-${{ matrix.arch }}-zip
          path: build-windows-cli-${{ matrix.arch }}/*.zip